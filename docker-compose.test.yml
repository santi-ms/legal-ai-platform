# ───────────────────────────────────────────────────────────────────────────
# Postgres efímero para los E2E / integration tests.
#
# Uso:
#   docker compose -f docker-compose.test.yml up -d
#   npm run e2e:api
#   docker compose -f docker-compose.test.yml down -v
#
# Expone el 5433 (no el 5432) para no colisionar con tu Postgres local si lo tenés.
# ───────────────────────────────────────────────────────────────────────────
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: doculex-postgres-test
    environment:
      POSTGRES_USER: doculex
      POSTGRES_PASSWORD: doculex
      POSTGRES_DB: doculex_test
    ports:
      - "5433:5432"
    tmpfs:
      # Postgres en RAM → tests mucho más rápidos y reinicios limpios
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doculex -d doculex_test"]
      interval: 2s
      timeout: 2s
      retries: 20
